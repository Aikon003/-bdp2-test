name: Docker Image CI

on:
  push:
    branches: [ "master" ]
  pull_request:
    branches: [ "master" ]

jobs:

  build:

    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4
    - name: Build the Docker image
      run: docker build . --file Dockerfile --tag aikon003z/web_server
    - name: Push the image to DockerHub
      run: docker loging -u aikon003z -p ${{ secrets.DOCKER_TOKEN}} && docker push aikon003z/web_server 
